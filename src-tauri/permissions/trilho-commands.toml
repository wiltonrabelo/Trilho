[[permission]]
identifier = "allow-get-app-info"
description = "Permite obter nome e versão do app."
commands.allow = ["get_app_info"]

[[permission]]
identifier = "allow-list-commits-mock"
description = "Permite listar commits de exemplo (M0)."
commands.allow = ["list_commits_mock"]

[[permission]]
identifier = "allow-repo-commands"
description = "Comandos de repositório (M1)."
commands.allow = [
  "validate_repo_path",
  "open_repo",
  "close_repo",
  "get_repo_info",
  "get_recent_repos",
  "remove_recent_repo",
  "list_commits",
  "get_repo_status",
  "get_file_diff",
  "get_commit_diff",
  "list_commit_files",
  "get_commit_file_diff",
  "get_sync_info",
  "get_credential_status",
  "configure_gcm_helper",
  "trigger_github_login",
  "store_github_pat",
  "logout_github_account",
  "enable_github_use_http_path",
  "test_github_ssh",
  "get_ssh_public_key",
  "fetch_remote",
  "get_branch_origin",
  "get_dual_trail",
  "list_branch_exclusive_commits",
  "get_file_blame",
  "preview_write_operation",
  "execute_write_operation",
  "preview_clone_remote",
  "list_local_branches",
  "list_remote_branches",
  "list_stashes",
  "list_tags",
  "list_ordered_compare_refs",
  "list_branch_diff_files",
  "get_branch_file_diff_cmd",
  "list_clone_remote_branches",
  "execute_clone_remote",
  "get_branch_pr_status",
  "get_conflict_file",
]
